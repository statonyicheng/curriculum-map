<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>管理框架知識星系 · STATON</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#000e2f;
    --navy-2:#03163f;
    --gold:#f4b702;
    --gold-soft:#c79a3a;
    --ink:#eef1f8;
    --muted:#8791a8;
    --faint:#586074;
    --line:rgba(244,183,2,0.14);
    --panel:rgba(3,13,38,0.9);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 800px at 78% 18%, rgba(244,183,2,0.05), transparent 60%),
      radial-gradient(900px 900px at 20% 90%, rgba(74,127,181,0.06), transparent 55%),
      var(--navy);
    color:var(--ink);
    font-family:"Noto Serif TC",serif;
    overflow:hidden;-webkit-font-smoothing:antialiased;
  }
  #app{position:fixed;inset:0}
  canvas{display:block;touch-action:none}

  /* loader */
  #loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;background:var(--navy);z-index:60;transition:opacity .7s ease}
  #loader.hide{opacity:0;pointer-events:none}
  .ring{width:38px;height:38px;border:2px solid rgba(244,183,2,.18);border-top-color:var(--gold);
    border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loader .lt{font-family:"Cormorant Garamond",serif;font-size:16px;letter-spacing:.06em;color:var(--gold-soft)}

  /* header */
  header{position:fixed;top:0;left:0;right:0;z-index:20;padding:26px 30px;pointer-events:none;
    display:flex;justify-content:space-between;align-items:flex-start;gap:24px}
  .brandmark{pointer-events:auto;max-width:560px}
  .kicker{font-family:"Cormorant Garamond",serif;font-size:13px;letter-spacing:.32em;
    text-transform:uppercase;color:var(--gold);margin-bottom:8px}
  header h1{font-weight:600;font-size:clamp(24px,2.8vw,38px);line-height:1.08;letter-spacing:.01em}
  header h1 .en{display:block;font-family:"Cormorant Garamond",serif;font-weight:500;
    font-size:.52em;letter-spacing:.14em;color:var(--muted);margin-top:6px;text-transform:uppercase}
  header .sub{margin-top:12px;font-size:14px;line-height:1.7;color:var(--muted);max-width:470px}
  header .sub b{color:var(--gold);font-weight:600;font-variant-numeric:tabular-nums}
  .credit{pointer-events:auto;text-align:right;font-family:"Cormorant Garamond",serif}
  .credit .logo{font-size:22px;letter-spacing:.28em;color:var(--gold);font-weight:600}
  .credit .tag{font-size:11px;letter-spacing:.18em;color:var(--faint);text-transform:uppercase;margin-top:4px}

  /* legend */
  #legend{position:fixed;left:30px;bottom:26px;z-index:20;background:var(--panel);
    backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:14px;
    padding:15px 16px;max-width:270px}
  #legend .lh{font-family:"Cormorant Garamond",serif;font-size:12px;text-transform:uppercase;
    letter-spacing:.2em;color:var(--faint);margin-bottom:11px}
  .cat{display:flex;align-items:center;gap:11px;padding:5px 6px;border-radius:8px;cursor:pointer;
    user-select:none;transition:background .15s}
  .cat:hover{background:rgba(244,183,2,.06)}
  .cat.off{opacity:.3}
  .cat .swatch{width:12px;height:12px;border-radius:3px;flex:none;box-shadow:0 0 10px var(--c)}
  .cat .nm{flex:1;font-size:13.5px;color:var(--ink)}
  .cat .ct{font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}

  /* axis hint */
  #axis{position:fixed;right:30px;top:50%;transform:translateY(-50%);z-index:15;
    display:flex;flex-direction:column;align-items:flex-end;gap:0;pointer-events:none;
    height:300px;justify-content:space-between}
  #axis .cap{font-family:"Cormorant Garamond",serif;font-size:11px;letter-spacing:.14em;
    color:var(--faint);text-transform:uppercase;text-align:right;line-height:1.4}
  #axis .bar{position:absolute;right:-14px;top:8px;bottom:8px;width:1px;
    background:linear-gradient(var(--gold),rgba(244,183,2,0.1))}

  /* hint */
  #hint{position:fixed;right:30px;bottom:26px;z-index:20;font-family:"Cormorant Garamond",serif;
    font-size:13px;letter-spacing:.05em;color:var(--faint);text-align:right;line-height:1.9;pointer-events:none}
  #hint b{color:var(--muted);font-weight:500}

  /* detail panel */
  #detail{position:fixed;top:0;right:0;bottom:0;width:min(420px,92vw);z-index:40;
    background:var(--panel);backdrop-filter:blur(20px);border-left:1px solid var(--line);
    transform:translateX(100%);transition:transform .38s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column}
  #detail.open{transform:translateX(0)}
  #detail .dhead{padding:26px 26px 18px;border-bottom:1px solid var(--line);position:relative}
  #detail .back{position:absolute;top:20px;left:24px;font-family:"Cormorant Garamond",serif;
    font-size:13px;letter-spacing:.1em;color:var(--muted);cursor:pointer;background:none;border:none;
    display:none;align-items:center;gap:6px}
  #detail .back:hover{color:var(--gold)}
  #detail .close{position:absolute;top:18px;right:20px;width:32px;height:32px;border:none;
    background:rgba(244,183,2,.08);border-radius:8px;color:var(--gold-soft);cursor:pointer;
    font-size:18px;line-height:1;transition:background .15s}
  #detail .close:hover{background:rgba(244,183,2,.16);color:var(--gold)}
  #detail .dtag{display:inline-flex;align-items:center;gap:8px;font-family:"Cormorant Garamond",serif;
    font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:12px;margin-top:14px}
  #detail .dtag .dot{width:10px;height:10px;border-radius:3px}
  #detail h2{font-weight:600;font-size:23px;line-height:1.25;padding-right:36px}
  #detail h2 .en{display:block;font-family:"Cormorant Garamond",serif;font-weight:500;font-size:.62em;
    letter-spacing:.08em;color:var(--faint);margin-top:5px;text-transform:none}
  #detail .dmeta{margin-top:12px;font-size:12.5px;color:var(--faint);display:flex;gap:16px;flex-wrap:wrap}
  #detail .dmeta span b{color:var(--muted);font-weight:500}
  #detail .dbody{padding:20px 26px;overflow-y:auto;flex:1}
  #detail .desc{font-size:14px;line-height:1.75;color:#c8cee0;margin-bottom:24px}
  #detail .prqcount{font-family:"Cormorant Garamond",serif;font-size:44px;font-weight:600;
    color:var(--gold);line-height:1;margin-bottom:2px}
  #detail .prqlabel{font-size:12.5px;color:var(--muted);margin-bottom:20px}
  #detail .sec{margin-bottom:24px}
  #detail .sec h3{font-family:"Cormorant Garamond",serif;font-size:12px;text-transform:uppercase;
    letter-spacing:.16em;color:var(--faint);margin-bottom:12px;display:flex;align-items:center;gap:9px}
  #detail .sec h3 .n{background:rgba(244,183,2,.14);color:var(--gold);border-radius:20px;
    padding:1px 9px;font-size:11px;letter-spacing:.02em;font-family:"Noto Serif TC"}
  .link-item{display:block;width:100%;text-align:left;border:1px solid var(--line);
    background:rgba(244,183,2,.02);border-radius:10px;padding:11px 13px;margin-bottom:8px;
    cursor:pointer;transition:background .15s,border-color .15s}
  .link-item:hover{background:rgba(244,183,2,.07);border-color:rgba(244,183,2,.28)}
  .link-item .ln{font-size:13.5px;color:var(--ink);font-weight:500;margin-bottom:3px;
    display:flex;align-items:center;gap:8px}
  .link-item .ln .d{width:8px;height:8px;border-radius:2px;flex:none}
  .link-item .lr{font-size:11.5px;color:var(--muted);line-height:1.5}
  .link-item .badge{font-family:"Cormorant Garamond",serif;font-size:9.5px;text-transform:uppercase;
    letter-spacing:.06em;padding:2px 7px;border-radius:10px;margin-left:auto;flex:none}
  .badge.hard{background:rgba(244,183,2,.14);color:var(--gold)}
  .badge.soft{background:rgba(133,145,168,.14);color:var(--faint)}
  .empty{font-size:12.5px;color:var(--faint);font-style:italic}

  @media (max-width:680px){
    header{padding:18px 20px}
    header .sub,.credit .tag{display:none}
    #legend{left:16px;bottom:16px;padding:12px;max-width:200px}
    #legend .cat .ct{display:none}
    #hint,#axis{display:none}
  }
</style>
</head>
<body>
<div id="app"></div>

<div id="loader">
  <div class="ring"></div>
  <div class="lt">正在編織 1,500 個管理節點…</div>
</div>

<header>
  <div class="brandmark">
    <div class="kicker">STATON · Knowledge Galaxy</div>
    <h1>企業經營的全景地圖
      <span class="en">The Management Framework Universe</span>
    </h1>
    <p class="sub"><b id="nCount">1,500</b> 個管理節點,<b id="eCount">4,169</b> 條方法連結,
      從單一工具到整合方法論。點擊任一節點,追溯它所依賴的一切。</p>
  </div>
  <div class="credit">
    <div class="logo">STATON</div>
    <div class="tag">仕坦登企業管理顧問</div>
  </div>
</header>

<div id="legend">
  <div class="lh">六大類別 · 點擊篩選</div>
  <div id="cats"></div>
</div>

<div id="axis">
  <div class="cap">整合方法論<br>Integrated</div>
  <div class="cap" style="margin-top:auto">單一工具<br>Single Tool</div>
  <div class="bar"></div>
</div>

<div id="hint"><b>拖曳</b>旋轉 · <b>滾輪</b>縮放 · <b>點擊</b>節點追溯</div>

<div id="detail">
  <button class="back" id="dBack">← 返回</button>
  <button class="close" id="dClose">×</button>
  <div class="dhead">
    <div class="dtag"><span class="dot" id="dDot"></span><span id="dCat"></span></div>
    <h2 id="dName"><span id="dNameZh"></span><span class="en" id="dNameEn"></span></h2>
    <div class="dmeta">
      <span><b>類別</b> <span id="dCatZh"></span></span>
      <span><b>複雜度</b> <span id="dTier"></span></span>
      <span><b>所屬框架</b> <span id="dFw"></span></span>
    </div>
  </div>
  <div class="dbody">
    <p class="desc" id="dDesc"></p>
    <div id="dCountBlock">
      <div class="prqcount" id="dPrqCount">0</div>
      <div class="prqlabel">項前置條件 · 學會這個節點前需先掌握的一切</div>
    </div>
    <div class="sec">
      <h3>直接建立於 <span class="n" id="dPrqN">0</span></h3>
      <div id="dPrereqs"></div>
    </div>
    <div class="sec">
      <h3>接續解鎖 <span class="n" id="dUnlN">0</span></h3>
      <div id="dUnlocks"></div>
    </div>
  </div>
</div>

<script src="vendor/three.min.js"></script>
<script>
let scene, camera, renderer, points, glowPoints, lineSeg, group;

function makeGlow(){
  const s=128,c=document.createElement('canvas');c.width=c.height=s;
  const g=c.getContext('2d');
  const gr=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  gr.addColorStop(0,'rgba(255,255,255,0.9)');
  gr.addColorStop(0.4,'rgba(255,255,255,0.3)');
  gr.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=gr;g.beginPath();g.arc(s/2,s/2,s/2,0,7);g.fill();
  const t=new THREE.Texture(c);t.needsUpdate=true;return t;
}
let raycaster, mouse = new THREE.Vector2();
let nodes = [], edges = [], byId = {}, catMeta = {}, fwMeta = {}, fwById = {};
let prereqMap = {}, unlockMap = {}, adjMap = {};
let hiddenCats = new Set();
let selectedId = null;
let autoRotate = true;

let isDragging = false, lastX = 0, lastY = 0;
let rotY = 0, targetRotY = 0, rotX = 0.02, targetRotX = 0.02;
let camDist = 300, targetCamDist = 300;
let camY = 0, targetCamY = 0;

// entrance reveal
let revealStart = 0;
let revealDone = false;
const REVEAL_MS = 3200;   // total time for all nodes to appear
const REVEAL_FADE = 0.14; // width of the per-node fade window

init();

async function init(){
  const res = await fetch('data/graph.json');
  const data = await res.json();
  nodes = data.nodes; edges = data.edges;
  catMeta = data.categories;
  data.frameworks.forEach(f=>{ fwById[f.id]=f; });
  fwMeta = data.frameworks;

  nodes.forEach((n,i)=>{ n._i=i; byId[n.id]=n; });
  edges.forEach(e=>{
    (prereqMap[e.t]=prereqMap[e.t]||[]).push(e);
    (unlockMap[e.p]=unlockMap[e.p]||[]).push(e);
    (adjMap[e.t]=adjMap[e.t]||new Set()).add(e.p);
    (adjMap[e.p]=adjMap[e.p]||new Set()).add(e.t);
  });

  document.getElementById('nCount').textContent = data.meta.nodeCount.toLocaleString();
  document.getElementById('eCount').textContent = data.meta.edgeCount.toLocaleString();

  buildScene();
  buildLegend();
  buildPoints();
  buildLines();
  bindEvents();
  revealStart = performance.now();
  animate();
  setTimeout(()=>document.getElementById('loader').classList.add('hide'), 350);
}

function catColor(c){ return catMeta[c] ? catMeta[c].color : '#888'; }
function hexRgb(h){const n=parseInt(h.slice(1),16);return[(n>>16&255)/255,(n>>8&255)/255,(n&255)/255];}

function buildScene(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 3000);
  camera.position.set(0, 0, camDist);
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  document.getElementById('app').appendChild(renderer.domElement);
  group = new THREE.Group();
  scene.add(group);
  raycaster = new THREE.Raycaster();
  raycaster.params.Points.threshold = 3.4;
}

function makeDot(){
  // hard-edged OPAQUE bubble (Marble style): solid fill, crisp rim,
  // tiny soft edge only for anti-aliasing so it doesn't blend to navy.
  const s=128,c=document.createElement('canvas');c.width=c.height=s;
  const g=c.getContext('2d');
  g.clearRect(0,0,s,s);
  // solid opaque disc
  g.fillStyle='rgba(255,255,255,1)';
  g.beginPath();g.arc(s/2,s/2,s*0.46,0,7);g.fill();
  // soft 1px anti-alias ring
  const grad=g.createRadialGradient(s/2,s/2,s*0.44,s/2,s/2,s*0.5);
  grad.addColorStop(0,'rgba(255,255,255,1)');
  grad.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=grad;g.beginPath();g.arc(s/2,s/2,s*0.5,0,7);g.fill();
  // subtle top-left highlight for dimensionality
  const hi=g.createRadialGradient(s*0.38,s*0.36,0,s*0.38,s*0.36,s*0.32);
  hi.addColorStop(0,'rgba(255,255,255,0.55)');
  hi.addColorStop(1,'rgba(255,255,255,0)');
  g.globalCompositeOperation='lighter';
  g.fillStyle=hi;g.beginPath();g.arc(s*0.38,s*0.36,s*0.32,0,7);g.fill();
  const t=new THREE.Texture(c);t.needsUpdate=true;return t;
}

function buildPoints(){
  const N=nodes.length;
  const pos=new Float32Array(N*3), col=new Float32Array(N*3),
        siz=new Float32Array(N), alp=new Float32Array(N).fill(0), // start hidden for reveal
        reveal=new Float32Array(N); // per-node reveal delay ordering
  // reveal order: bottom (tail) first, sweeping up — feels like it grows
  const order=nodes.map((n,i)=>i).sort((a,b)=>nodes[a].y-nodes[b].y);
  order.forEach((idx,rank)=>{ reveal[idx]=rank/N; });
  nodes.forEach((n,i)=>{
    pos[i*3]=n.x; pos[i*3+1]=n.y; pos[i*3+2]=n.z;
    const c=hexRgb(catColor(n.c));
    col[i*3]=c[0];col[i*3+1]=c[1];col[i*3+2]=c[2];
    // varied bubble sizes like Marble; hubs largest, details small
    const base=[22,15,10,7][n.l];
    siz[i]=base + n.cen*20;
    n._reveal=reveal[i];
  });
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  geo.setAttribute('size',new THREE.BufferAttribute(siz,1));
  geo.setAttribute('alpha',new THREE.BufferAttribute(alp,1));
  geo.setAttribute('baseColor',new THREE.BufferAttribute(col.slice(),3));
  const mat=new THREE.ShaderMaterial({
    uniforms:{tex:{value:makeDot()},scale:{value:innerHeight/2}},
    vertexShader:`attribute float size;attribute float alpha;attribute vec3 color;
      varying vec3 vColor;varying float vAlpha;uniform float scale;
      void main(){vColor=color;vAlpha=alpha;
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=size*(scale/-mv.z);gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`uniform sampler2D tex;varying vec3 vColor;varying float vAlpha;
      void main(){vec4 t=texture2D(tex,gl_PointCoord);if(t.a<0.08)discard;
        gl_FragColor=vec4(vColor,t.a*vAlpha);}`,
    transparent:true,depthWrite:false,depthTest:false,
    blending:THREE.NormalBlending   // solid bubbles, not glowing haze
  });
  points=new THREE.Points(geo,mat);
  group.add(points);

  // ---- soft glow layer underneath (additive) for luminous mass ----
  const glowGeo=new THREE.BufferGeometry();
  glowGeo.setAttribute('position',new THREE.BufferAttribute(pos.slice(),3));
  glowGeo.setAttribute('color',new THREE.BufferAttribute(col.slice(),3));
  const glowSiz=new Float32Array(N);
  for(let i=0;i<N;i++) glowSiz[i]=siz[i]*2.2;
  glowGeo.setAttribute('size',new THREE.BufferAttribute(glowSiz,1));
  glowGeo.setAttribute('alpha',new THREE.BufferAttribute(alp,1)); // shares reveal alpha
  const glowMat=new THREE.ShaderMaterial({
    uniforms:{tex:{value:makeGlow()},scale:{value:innerHeight/2}},
    vertexShader:`attribute float size;attribute float alpha;attribute vec3 color;
      varying vec3 vColor;varying float vAlpha;uniform float scale;
      void main(){vColor=color;vAlpha=alpha;
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=size*(scale/-mv.z);gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`uniform sampler2D tex;varying vec3 vColor;varying float vAlpha;
      void main(){vec4 t=texture2D(tex,gl_PointCoord);
        gl_FragColor=vec4(vColor,t.a*vAlpha*0.35);}`,
    transparent:true,depthWrite:false,depthTest:false,
    blending:THREE.AdditiveBlending
  });
  glowPoints=new THREE.Points(glowGeo,glowMat);
  glowPoints.renderOrder=-1; // draw behind solid bubbles
  group.add(glowPoints);
}

function buildLines(){
  const seg=[],col=[];
  edges.forEach(e=>{
    const a=byId[e.t],b=byId[e.p];if(!a||!b)return;
    seg.push(a.x,a.y,a.z,b.x,b.y,b.z);
    // faint cool-grey threads (Marble style) — subtle, node-subordinate
    const al=e.s==='hard'?0.16:0.08;
    const g=[0.62,0.68,0.82]; // soft blue-grey
    col.push(g[0]*al,g[1]*al,g[2]*al,g[0]*al,g[1]*al,g[2]*al);
  });
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(seg,3));
  geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  geo.setAttribute('baseColor',new THREE.Float32BufferAttribute(col.slice(),3));
  const mat=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,
    opacity:0,   // start hidden, fade in after nodes
    blending:THREE.NormalBlending,depthWrite:false});
  lineSeg=new THREE.LineSegments(geo,mat);
  group.add(lineSeg);
}

function buildLegend(){
  const box=document.getElementById('cats');
  const counts={};nodes.forEach(n=>counts[n.c]=(counts[n.c]||0)+1);
  Object.keys(catMeta).forEach(c=>{
    if(!counts[c])return;
    const el=document.createElement('div');
    el.className='cat';el.dataset.c=c;
    el.innerHTML=`<span class="swatch" style="--c:${catMeta[c].color};background:${catMeta[c].color}"></span>
      <span class="nm">${catMeta[c].zh}</span><span class="ct">${counts[c]}</span>`;
    el.onclick=()=>toggleCat(c,el);
    box.appendChild(el);
  });
}

function toggleCat(c,el){
  if(hiddenCats.has(c)){hiddenCats.delete(c);el.classList.remove('off');}
  else{hiddenCats.add(c);el.classList.add('off');}
  if(selectedId) highlightConnected(selectedId); else clearHighlight();
}

// ---- highlight logic: selected + neighbors bright, rest faded ----
function highlightConnected(id){
  const keep=new Set([id]);
  (adjMap[id]||new Set()).forEach(x=>keep.add(x));
  const alpha=points.geometry.getAttribute('alpha');
  nodes.forEach((n,i)=>{
    let a;
    if(hiddenCats.has(n.c)) a=0;
    else if(keep.has(n.id)) a=1;
    else a=0.02;
    alpha.array[i]=a;
  });
  alpha.needsUpdate=true;

  // lines: only edges touching id bright, rest dim
  const col=lineSeg.geometry.getAttribute('color');
  const base=lineSeg.geometry.getAttribute('baseColor');
  let p=0;
  edges.forEach(e=>{
    const a=byId[e.t],b=byId[e.p];if(!a||!b){return;}
    const touches=(e.t===id||e.p===id);
    const hide=hiddenCats.has(a.c)||hiddenCats.has(b.c);
    let mult;
    if(hide) mult=0;
    else if(touches) mult=8.5;   // brighten connected edges
    else mult=0.04;
    for(let k=0;k<6;k++){col.array[p+k]=base.array[p+k]*mult;}
    p+=6;
  });
  col.needsUpdate=true;
}

function clearHighlight(){
  const alpha=points.geometry.getAttribute('alpha');
  nodes.forEach((n,i)=>{alpha.array[i]=hiddenCats.has(n.c)?0:1;});
  alpha.needsUpdate=true;
  const col=lineSeg.geometry.getAttribute('color');
  const base=lineSeg.geometry.getAttribute('baseColor');
  let p=0;
  edges.forEach(e=>{
    const a=byId[e.t],b=byId[e.p];if(!a||!b)return;
    const hide=hiddenCats.has(a.c)||hiddenCats.has(b.c);
    const m=hide?0:1;
    for(let k=0;k<6;k++)col.array[p+k]=base.array[p+k]*m;
    p+=6;
  });
  col.needsUpdate=true;
}

function bindEvents(){
  const el=renderer.domElement;
  el.addEventListener('pointerdown',e=>{isDragging=true;autoRotate=false;
    lastX=e.clientX;lastY=e.clientY;el.setPointerCapture(e.pointerId);});
  el.addEventListener('pointermove',e=>{
    if(isDragging){
      const dx=e.clientX-lastX,dy=e.clientY-lastY;
      targetRotY+=dx*0.005;
      targetRotX+=dy*0.004;targetRotX=Math.max(-0.9,Math.min(0.9,targetRotX));
      lastX=e.clientX;lastY=e.clientY;
    }else updateCursor(e);
  });
  el.addEventListener('pointerup',e=>{
    isDragging=false;
    const moved=Math.abs(e.clientX-lastX)+Math.abs(e.clientY-lastY);
    if(moved<4)pickAt(e);
    // resume gentle self-rotation after a short pause (unless a node is open)
    clearTimeout(window._rotTimer);
    window._rotTimer=setTimeout(()=>{ if(!selectedId) autoRotate=true; }, 2500);
  });
  el.addEventListener('wheel',e=>{e.preventDefault();
    targetCamDist*=(1+Math.sign(e.deltaY)*0.08);
    targetCamDist=Math.max(180,Math.min(900,targetCamDist));},{passive:false});
  window.addEventListener('resize',onResize);
  document.getElementById('dClose').onclick=closeDetail;
  document.getElementById('dBack').onclick=closeDetail;
  let pd=0;
  el.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY);
      if(pd){targetCamDist*=pd/d;targetCamDist=Math.max(150,Math.min(760,targetCamDist));}
      pd=d;
    }
  },{passive:true});
  el.addEventListener('touchend',()=>pd=0);
}

function ray(e){
  const r=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-r.left)/r.width)*2-1;
  mouse.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
}
function pickAt(e){
  ray(e);
  const hits=raycaster.intersectObject(points);
  const hit=hits.find(h=>!hiddenCats.has(nodes[h.index].c) &&
    points.geometry.getAttribute('alpha').array[h.index]>0.2);
  if(hit)selectNode(nodes[hit.index].id);
  else closeDetail();
}
function updateCursor(e){
  ray(e);
  const hits=raycaster.intersectObject(points);
  const hit=hits.find(h=>!hiddenCats.has(nodes[h.index].c));
  renderer.domElement.style.cursor=hit?'pointer':'grab';
}

function tierLabel(t){return ['單一工具','操作方法','系統框架','整合方法論'][t]||'—';}

function selectNode(id){
  selectedId=id;autoRotate=false;
  const n=byId[id];const col=catColor(n.c);
  document.getElementById('dDot').style.background=col;
  document.getElementById('dCat').textContent=(catMeta[n.c]||{}).zh||n.c;
  document.getElementById('dNameZh').textContent=n.n;
  document.getElementById('dNameEn').textContent=n.en||'';
  document.getElementById('dNameEn').style.display=n.en?'block':'none';
  document.getElementById('dCatZh').textContent=(catMeta[n.c]||{}).zh||'—';
  document.getElementById('dTier').textContent=tierLabel(n.ti);
  document.getElementById('dFw').textContent=(fwById[n.fw]||{}).zh||'—';
  document.getElementById('dDesc').textContent=n.d;

  const prq=prereqMap[id]||[];
  const unl=unlockMap[id]||[];

  // total prerequisites traced back (BFS)
  const seen=new Set();const q=[...prq.map(e=>e.p)];
  while(q.length){const x=q.shift();if(seen.has(x))continue;seen.add(x);
    (prereqMap[x]||[]).forEach(e=>{if(!seen.has(e.p))q.push(e.p);});}
  document.getElementById('dPrqCount').textContent=seen.size;

  document.getElementById('dPrqN').textContent=prq.length;
  const pBox=document.getElementById('dPrereqs');pBox.innerHTML='';
  if(!prq.length)pBox.innerHTML='<div class="empty">無 — 這是一個起點概念。</div>';
  prq.slice(0,20).forEach(e=>{const p=byId[e.p];if(p)pBox.appendChild(linkCard(p,e.r,e.s));});
  if(prq.length>20)pBox.appendChild(moreEl(prq.length-20));

  document.getElementById('dUnlN').textContent=unl.length;
  const uBox=document.getElementById('dUnlocks');uBox.innerHTML='';
  if(!unl.length)uBox.innerHTML='<div class="empty">無 — 這是一個末端節點。</div>';
  unl.slice(0,15).forEach(e=>{const c=byId[e.t];if(c)uBox.appendChild(linkCard(c,e.r,e.s));});
  if(unl.length>15)uBox.appendChild(moreEl(unl.length-15));

  document.getElementById('dBack').style.display=selectedId?'flex':'none';
  document.getElementById('detail').classList.add('open');
  highlightConnected(id);
  focusOn(n);
}

function linkCard(node,reason,strength){
  const col=catColor(node.c);
  const el=document.createElement('button');
  el.className='link-item';
  el.innerHTML=`<div class="ln"><span class="d" style="background:${col}"></span>${node.n}
    <span class="badge ${strength}">${strength==='hard'?'必備':'相關'}</span></div>
    ${reason?`<div class="lr">${reason}</div>`:''}`;
  el.onclick=()=>selectNode(node.id);
  return el;
}
function moreEl(n){const d=document.createElement('div');d.className='empty';
  d.textContent=`＋ 另有 ${n} 個`;return d;}

function focusOn(n){
  const ang=Math.atan2(n.x,n.z);
  targetRotY=-ang;
  targetCamY=n.y*0.62;
  // zoom in toward the selected cluster
  targetCamDist=Math.max(200, Math.min(340, 260));
}

function closeDetail(){
  document.getElementById('detail').classList.remove('open');
  selectedId=null;clearHighlight();
  targetCamY=0;targetCamDist=560;
  autoRotate=true;
}

function onResize(){
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  if(points)points.material.uniforms.scale.value=innerHeight/2;
}

function animate(){
  requestAnimationFrame(animate);

  // ---- entrance reveal: nodes fade+grow in, bottom-to-top, then lines ----
  if(!revealDone){
    const t=(performance.now()-revealStart)/REVEAL_MS; // 0..1
    const alpha=points.geometry.getAttribute('alpha');
    for(let i=0;i<nodes.length;i++){
      const d=nodes[i]._reveal;              // 0..1 order
      // node becomes visible as the sweep passes its position
      let a=(t - d)/REVEAL_FADE;
      a=a<0?0:(a>1?1:a);
      // respect category hiding even during reveal
      alpha.array[i]=hiddenCats.has(nodes[i].c)?0:a;
    }
    alpha.needsUpdate=true;
    // lines fade in over the last 40% of the reveal
    lineSeg.material.opacity = Math.max(0, Math.min(1, (t-0.6)/0.4));
    if(t>=1+REVEAL_FADE){
      revealDone=true;
      lineSeg.material.opacity=1;
      if(!selectedId) clearHighlight();
    }
  }

  // ---- continuous self-rotation (never stops unless dragging) ----
  if(autoRotate) targetRotY += 0.0011;
  rotY+=(targetRotY-rotY)*0.07;
  rotX+=(targetRotX-rotX)*0.07;
  camDist+=(targetCamDist-camDist)*0.07;
  camY+=(targetCamY-camY)*0.06;
  group.rotation.y=rotY;
  group.rotation.x=rotX;
  camera.position.z=camDist;
  camera.position.y=camY;
  camera.lookAt(0,camY*0.5,0);
  renderer.render(scene,camera);
}
</script>
